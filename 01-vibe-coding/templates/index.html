<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Journey | Mindful Travel Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #c3bef0;
            --secondary: #deacf5;
            --text: #f0f0f0;
            --bg-gradient: linear-gradient(135deg, #09090b 0%, #18181b 50%, #09090b 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: var(--accent);
            animation: float 20s infinite alternate;
        }

        .blob-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: var(--accent); }
        .blob-2 { width: 300px; height: 300px; bottom: -50px; right: -50px; background: var(--secondary); animation-delay: -5s; }

        @keyframes float {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(100px, 100px) rotate(360deg); }
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .quote {
            font-style: italic;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 3rem;
        }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }

        section h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        /* Form Styling */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(195, 190, 240, 0.1);
        }

        button {
            width: 100%;
            background: white;
            color: black;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            background: var(--accent);
            box-shadow: 0 10px 20px -5px rgba(195, 190, 240, 0.4);
        }

        /* Trip Cards */
        .trip-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .trip-list::-webkit-scrollbar { width: 4px; }
        .trip-list::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .trip-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .trip-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.03);
            border-color: var(--accent);
        }

        .trip-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .destination {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .date {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .note {
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="dashboard">
        <header>
            <h1>Zen Journey</h1>
            <p class="quote">"{{ quote }}"</p>
        </header>

        <div class="main-content">
            <section class="planner">
                <h2>Plan New Journey</h2>
                <form action="/" method="POST">
                    <div class="input-group">
                        <label for="destination">Where to?</label>
                        <input type="text" id="destination" name="destination" placeholder="e.g. Kyoto, Japan" required>
                    </div>
                    <div class="input-group">
                        <label for="date">When?</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="input-group">
                        <label for="note">Mindful Note</label>
                        <textarea id="note" name="note" rows="4" placeholder="What brings you peace here?"></textarea>
                    </div>
                    <button type="submit">Add to Itinerary</button>
                </form>
            </section>

            <section class="itinerary">
                <h2>Your Itinerary</h2>
                <div class="trip-list">
                    {% if trips %}
                        {% for trip in trips %}
                            <div class="trip-card">
                                <div class="trip-header">
                                    <div class="destination">{{ trip.destination }}</div>
                                    <div class="date">{{ trip.date }}</div>
                                </div>
                                <div class="note">{{ trip.note }}</div>
                            </div>
                        {% endfor %}
                    {% else %}
                        <div class="empty-state">
                            <p>No journeys planned yet.</p>
                        </div>
                    {% endif %}
                </div>
            </section>
        </div>
    </main>
</body>
</html>
