<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Vault - Login and Search</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        .search-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input[type="text"] { width: 80%; padding: 8px; margin-bottom: 10px; }
        input[type="submit"] { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Welcome to the Security Playground</h1>
    <p>Try to find information about the 'admin' user or perform an XSS attack!</p>
    
    <div class="search-container">
        <h2>Search User Database</h2>
        <form action="/search" method="get">
            <input type="text" name="username" placeholder="Enter username...">
            <input type="submit" value="Search">
        </form>
    </div>
</body>
</html>
