<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <h1>Search Results for: {{ username }}</h1>
    <p>We found {{ results|length }} user(s):</p>
    <ul>
        {% for user in results %}
            <li>User: {{ user[0] }} | Data: {{ user[1] }}</li>
        {% endfor %}
    </ul>
    <hr>
    <a href="/">Back to Search</a>
</body>
</html>
